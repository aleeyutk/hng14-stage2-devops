name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python api
        run: flake8 api/ --max-line-length=120 --exclude=api/tests

      - name: Lint Python worker
        run: flake8 worker/ --max-line-length=120

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint JavaScript
        working-directory: ./frontend
        run: npm run lint

      - name: Lint api Dockerfile
        run: docker run --rm -i hadolint/hadolint < api/Dockerfile

      - name: Lint worker Dockerfile
        run: docker run --rm -i hadolint/hadolint < worker/Dockerfile

      - name: Lint frontend Dockerfile
        run: docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi==0.104.1 uvicorn==0.24.0 redis==5.0.1
          pip install pytest==7.4.3 pytest-cov==4.1.0 fakeredis==2.20.0 httpx==0.25.2 anyio==3.7.1

      - name: Create init files
        run: |
          touch api/__init__.py
          touch api/tests/__init__.py

      - name: Run pytest with coverage
        run: PYTHONPATH=. pytest --cov=api --cov-report=xml api/tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images as artifact
        run: |
          docker pull localhost:5000/frontend:latest
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker save localhost:5000/frontend:latest localhost:5000/api:latest localhost:5000/worker:latest | gzip > images.tar.gz

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar.gz

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load and push images to registry
        run: |
          gunzip -c images.tar.gz | docker load
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:latest

       - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3

      - name: Scan API image with Trivy
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format table localhost:5000/api:latest

      - name: Upload API SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          exit-code: '0'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan worker image with Trivy
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format table localhost:5000/worker:latest

      - name: Upload worker SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/worker:latest'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          exit-code: '0'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        run: |
          trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed \
            --format table localhost:5000/frontend:latest

      - name: Upload frontend SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          exit-code: '0'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Upload all Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: '*.sarif'

  integration-test:
    name: Integration Test
    needs: security-scan
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: gunzip -c images.tar.gz | docker load

      - name: Setup environment file
        run: |
          echo "REDIS_HOST=redis" > .env
          echo "REDIS_PASSWORD=testpassword123" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start services
        run: docker compose up -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          for i in {1..20}; do
            REDIS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q redis) 2>/dev/null || echo "unknown")
            API=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "unknown")
            FRONTEND=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend) 2>/dev/null || echo "unknown")
            echo "Redis: $REDIS | API: $API | Frontend: $FRONTEND"
            if [ "$REDIS" = "healthy" ] && [ "$API" = "healthy" ] && [ "$FRONTEND" = "healthy" ]; then
              echo "All services healthy!"
              break
            fi
            sleep 5
          done
          docker compose ps

      - name: Run integration test script
        run: bash integration-test.sh

      - name: Tear down services
        if: always()
        run: docker compose down

  deploy:
    name: Deploy
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/hngdevops/hng14-stage2-devops
            git pull origin main

            # Build new images
            docker compose build

            # Run canary health check on new api image
            docker run -d \
              --name api_canary \
              --network app-network \
              -e REDIS_HOST=redis \
              -e REDIS_PASSWORD=$(grep REDIS_PASSWORD .env | cut -d= -f2) \
              hng14-stage2-devops-api:latest

            # Poll health for up to 60 seconds
            HEALTHY=false
            for i in {1..12}; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' api_canary 2>/dev/null || echo "missing")
              echo "Attempt $i - Health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              sleep 5
            done

            # Clean up canary container
            docker stop api_canary || true
            docker rm api_canary || true

            if [ "$HEALTHY" = "true" ]; then
              echo "Health check passed, deploying full stack"
              docker compose up -d --force-recreate
            else
              echo "Health check failed, aborting deploy - old containers remain running"
              exit 1
            fi
